name: flutter_ui_kit_l10n
description: Shared localization package for Flutter UI Kit monorepo. Provides common UI translations reusable across multiple Flutter apps.
version: 0.0.12
homepage: https://github.com/jun-young1993/flutter_ui_kit
repository: https://github.com/jun-young1993/flutter_ui_kit
issue_tracker: https://github.com/jun-young1993/flutter_ui_kit/issues

resolution: workspace

environment:
  sdk: ^3.10.7
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_ui_kit_widget: ^0.0.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

topics:
  - l10n
  - localization
  - i18n
  - ui
  - design-system

flutter:
  generate: true
