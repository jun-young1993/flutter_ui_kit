version: 0.1.16

homepage: https://github.com/jun-young1993/flutter_ui_kit
repository: https://github.com/jun-young1993/flutter_ui_kit
issue_tracker: https://github.com/jun-young1993/flutter_ui_kit/issues

resolution: workspace

environment:
  sdk: ^3.10.7
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_ui_kit_theme: ^0.1.16
  package_info_plus: ^8.0.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

topics:
  - settings
  - ui
  - widgets
  - design-system
